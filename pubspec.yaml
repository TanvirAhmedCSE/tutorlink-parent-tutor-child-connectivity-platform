dependencies:
  flutter:
    sdk: flutter

  # Firebase (latest stable aligned set)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications (IMPORTANT: stable pin to avoid build crash)
  awesome_notifications: ^0.11.0

  # File handling
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  timeago: ^3.7.0
  intl: ^0.20.2
  uuid: ^4.5.1
  fl_chart: ^0.69.0

  # Utils
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true